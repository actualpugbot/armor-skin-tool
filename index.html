<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Armor Skin Tool</title>
    <meta name="description" content="Convert Minecraft player skins into armor-stand statue textures." />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23271709'/%3E%3Crect x='12' y='10' width='40' height='12' fill='%23f2c077'/%3E%3Crect x='16' y='24' width='32' height='18' fill='%23d2a15b'/%3E%3Crect x='12' y='44' width='40' height='8' fill='%237b4e2b'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1>Armor Skin Tool</h1>
        <p class="subtitle">Convert a Minecraft skin to an armor-stand statue texture.</p>
      </header>

      <section class="layout">
        <section class="panel control-panel">
          <label class="field" for="username-input">
            <span class="field-label">Minecraft username</span>
            <div class="input-group">
              <input
                id="username-input"
                type="text"
                placeholder="actualPUG"
                autocomplete="off"
                spellcheck="false"
              />
              <button class="ghost-button" id="username-load" type="button">Load</button>
            </div>
          </label>

          <label class="dropzone" id="skin-dropzone" for="skin-input">
            <input id="skin-input" type="file" accept="image/png,image/*" hidden />
            <span class="dropzone-title">Drop skin PNG or click to browse</span>
          </label>

          <p class="status" id="source-status">Load a skin to begin.</p>

          <div class="field-grid">
            <label class="field" for="model-select">
              <span class="field-label">Arm model</span>
              <select id="model-select">
                <option value="auto" selected>Auto detect</option>
                <option value="classic">Classic / Steve</option>
                <option value="slim">Slim / Alex</option>
              </select>
              <span class="field-help" id="model-help"></span>
            </label>

            <label class="field" for="filename-input">
              <span class="field-label">Output filename</span>
              <input
                id="filename-input"
                type="text"
                value="wood001.png"
                autocomplete="off"
                spellcheck="false"
              />
              <span class="field-help" id="filename-help"></span>
            </label>
          </div>

          <button class="primary-button" id="download-button" type="button" disabled>
            Download PNG
          </button>
          <span class="sr-only" id="download-note"></span>

          <!-- hidden JS targets -->
          <span id="detected-model" hidden></span>
        </section>

        <section class="panel preview-panel">
          <div class="preview-grid">
            <article class="preview-card">
              <p class="preview-label">Source skin</p>
              <div class="canvas-frame canvas-frame--square">
                <canvas id="source-preview" width="64" height="64"></canvas>
              </div>
              <p class="preview-meta" id="source-title">No skin loaded</p>
              <span id="source-meta" hidden></span>
            </article>

            <article class="preview-card">
              <p class="preview-label">Output</p>
              <div class="canvas-frame canvas-frame--wide">
                <canvas id="output-preview" width="64" height="155"></canvas>
              </div>
              <p class="preview-meta" id="output-title">Waiting for skin</p>
              <span id="output-meta" hidden></span>
            </article>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
